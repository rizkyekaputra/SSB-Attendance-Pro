<style>

=========================================================
  SSB Attendance Pro Enterprise
  CSS Framework v18.0.0
=========================================================*/


/*=========================================================
ROOT
=========================================================*/

:root{

--primary:#2563EB;
--primary-dark:#1D4ED8;

--success:#10B981;
--danger:#EF4444;
--warning:#F59E0B;

--sidebar:#1F2937;
--background:#F3F6FB;
--card:#FFFFFF;

--text:#111827;
--border:#E5E7EB;

--radius:16px;

--header-height:70px;
--sidebar-width:260px;

--shadow:0 10px 25px rgba(0,0,0,.08);

}


/*=========================================================
RESET
=========================================================*/

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:'Poppins',sans-serif;
background:var(--background);
color:var(--text);

}


/*=========================================================
APP
=========================================================*/

.app-wrapper{

height:100vh;
display:flex;
flex-direction:column;

}


/*=========================================================
HEADER
=========================================================*/

.app-header{

height:var(--header-height);

background:#FFFFFF;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 30px;

box-shadow:var(--shadow);

z-index:100;

}

.app-header-left{

display:flex;

align-items:center;

gap:15px;

}

.app-logo{

width:48px;

height:48px;

border-radius:50%;

background:var(--primary);

color:#FFFFFF;

display:flex;

justify-content:center;

align-items:center;

font-size:24px;

}

.app-user{

display:flex;

align-items:center;

gap:10px;

}

.app-user i{

font-size:30px;

color:var(--primary);

}


/*=========================================================
LAYOUT
=========================================================*/

.app-layout{

flex:1;

display:flex;

overflow:hidden;

}


/*=========================================================
SIDEBAR
=========================================================*/

.app-sidebar{

width:var(--sidebar-width);

background:var(--sidebar);

display:flex;

flex-direction:column;

justify-content:space-between;

padding:20px;

}

.app-menu{

display:flex;

flex-direction:column;

gap:10px;

}

.app-menu-item{

border:none;

background:none;

color:#D1D5DB;

padding:14px 18px;

border-radius:12px;

display:flex;

align-items:center;

gap:15px;

font-size:15px;

transition:.3s;

cursor:pointer;

}

.app-menu-item:hover{

background:#374151;

color:#FFFFFF;

}

.app-menu-item.active{

background:var(--primary);

color:#FFFFFF;

}

.app-sidebar-footer{

color:#9CA3AF;

font-size:13px;

text-align:center;

padding-top:20px;

}


/*=========================================================
MAIN
=========================================================*/

.app-main{

flex:1;

padding:30px;

overflow:auto;

}


/*=========================================================
CARD
=========================================================*/

.app-card{

background:var(--card);

border-radius:var(--radius);

box-shadow:var(--shadow);

padding:25px;

}


/*=========================================================
BUTTON
=========================================================*/

.app-btn{

border:none;

padding:12px 22px;

border-radius:12px;

cursor:pointer;

font-weight:600;

transition:.3s;

}

.app-btn-primary{

background:var(--primary);

color:#FFFFFF;

}

.app-btn-primary:hover{

background:var(--primary-dark);

}


/*=========================================================
TABLE
=========================================================*/

.app-table{

background:#FFFFFF;

border-radius:var(--radius);

overflow:hidden;

box-shadow:var(--shadow);

}


/*=========================================================
RESPONSIVE
=========================================================*/

@media(max-width:768px){

.app-sidebar{

width:80px;

}

.app-menu-item span{

display:none;

}

.app-header h4{

display:none;

}

}

/*=========================================================
WELCOME
=========================================================*/

.app-welcome{

display:flex;

justify-content:space-between;

align-items:center;

padding:40px;

background:linear-gradient(
135deg,
#2563EB,
#1D4ED8
);

color:#FFFFFF;

margin-bottom:30px;

overflow:hidden;

position:relative;

}

.app-welcome h1{

font-size:34px;

font-weight:700;

margin-bottom:10px;

}

.app-welcome h5{

font-weight:500;

margin-bottom:8px;

opacity:.95;

}

.app-welcome p{

margin-bottom:8px;

opacity:.9;

}

.app-welcome small{

font-size:14px;

opacity:.9;

}

.app-btn-light{

background:#FFFFFF;

color:#2563EB;

font-weight:600;

padding:14px 26px;

border-radius:14px;

transition:.3s;

}

.app-btn-light:hover{

transform:translateY(-3px);

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.app-welcome::after{

content:"";

position:absolute;

right:-70px;

top:-70px;

width:220px;

height:220px;

background:rgba(255,255,255,.08);

border-radius:50%;

}


/*=========================================================
DAY 2 - DASHBOARD PREMIUM UI POLISH
=========================================================*/

:root{

--dashboard-space:28px;
--dashboard-shadow:0 14px 35px rgba(15,23,42,.08);

}

.app-main{

padding:34px;

}

#dashboardPage{

max-width:1440px;
margin:0 auto;

}

.app-header{

box-shadow:0 4px 18px rgba(15,23,42,.06);

}

.app-sidebar{

box-shadow:10px 0 30px rgba(15,23,42,.05);

}

.app-card{

border:1px solid rgba(229,231,235,.9);
box-shadow:var(--dashboard-shadow);

}

.app-welcome{

min-height:210px;
padding:38px 40px;
box-shadow:0 18px 38px rgba(29,78,216,.22);

}

.app-dashboard-grid{

gap:22px;
margin-bottom:var(--dashboard-space);

}

.app-dashboard-grid .app-card{

cursor:pointer;
transition:transform .25s ease,box-shadow .25s ease;

}

.app-dashboard-grid .app-card:hover{

transform:translateY(-5px);
box-shadow:0 18px 36px rgba(15,23,42,.13);

}

.app-dashboard-grid .app-card:hover .app-stat-icon{

transform:scale(1.08);
transition:.3s ease;

}

.app-stat-icon{

box-shadow:inset 0 0 0 1px rgba(37,99,235,.08);

}

.app-dashboard-grid h2{

font-variant-numeric:tabular-nums;

}

.app-quick-action-card,
.app-recent-activity-card,
.app-version-card{

margin-top:var(--dashboard-space);

}

.app-recent-activity-card #dashActivity{

margin-top:4px;

}

.app-version-card .table{

margin-bottom:0;

}

.app-version-card .table td{

vertical-align:middle;

}

@media(max-width:992px){

.app-main{

padding:26px;

}

.app-dashboard-grid{

gap:18px;

}

}

@media(max-width:768px){

.app-main{

padding:20px;

}

.app-welcome{

min-height:auto;
padding:28px;

}

.app-quick-action-card,
.app-recent-activity-card,
.app-version-card{

margin-top:20px;

}

}

@media(max-width:480px){

.app-main{

padding:14px;

}

.app-welcome{

padding:22px;

}

.app-dashboard-grid{

gap:14px;

}

}

/*=========================================================
ENTERPRISE FRAMEWORK EXTENSIONS
Enterprise Edition v2.1.0
=========================================================*/

/*=========================================================
ENTERPRISE VARIABLES
=========================================================*/

:root{

--transition:.25s ease;
--warning-light:#FEF3C7;

--z-sidebar:100;
--z-header:200;
--z-modal:1050;
--z-toast:1100;

--text-muted:#6B7280;
--border-warning:#F59E0B;

}

/*=========================================================
LAYOUT ENHANCEMENTS
=========================================================*/

.app-header{

position:relative;
z-index:var(--z-header);
border-bottom:1px solid var(--border);

}

.app-sidebar{

position:relative;
z-index:var(--z-sidebar);
background:linear-gradient(180deg,#111827 0%,var(--sidebar) 100%);

}

.app-menu-item{

width:100%;
font-family:inherit;
font-weight:500;
text-align:left;
transition:background var(--transition),color var(--transition),transform var(--transition);

}

.app-menu-item i{

width:20px;
font-size:18px;
text-align:center;

}

.app-menu-item:hover{

transform:translateX(2px);

}

.app-main{

min-width:0;

}

/*=========================================================
DASHBOARD AND CARDS
=========================================================*/

.app-dashboard-grid{

display:grid;
grid-template-columns:repeat(4,minmax(0,1fr));
gap:20px;
margin-bottom:24px;

}

.app-dashboard-grid .app-card{

position:relative;
min-height:154px;
overflow:hidden;
transition:transform var(--transition),box-shadow var(--transition);

}

.app-dashboard-grid .app-card:hover{

transform:translateY(-4px);
box-shadow:0 16px 32px rgba(15,23,42,.12);

}

.app-stat-icon{

display:inline-flex;
align-items:center;
justify-content:center;
width:44px;
height:44px;
margin-bottom:17px;
border-radius:13px;
background:#EFF6FF;
color:var(--primary);
font-size:20px;

}

.app-activity-item{

display:flex;
align-items:center;
gap:12px;
padding:14px 0;
border-bottom:1px solid var(--border);

}

.app-activity-item:last-child{

border-bottom:none;

}

.app-activity-icon{

display:flex;
align-items:center;
justify-content:center;
width:38px;
height:38px;
flex:0 0 38px;
border-radius:12px;
background:#EFF6FF;
color:var(--primary);

}

/*=========================================================
TABLES
=========================================================*/

.app-table{

width:100%;
border:1px solid var(--border);
border-spacing:0;
border-radius:12px;
border-collapse:separate;
overflow:hidden;

}

.app-table th{

padding:13px 16px;
border-bottom:1px solid var(--border);
background:#F8FAFC;
color:#475569;
font-size:13px;
font-weight:600;
text-align:left;

}

.app-table td{

padding:13px 16px;
border-bottom:1px solid var(--border);
font-size:13px;
text-align:left;

}

.app-table tr:last-child td{

border-bottom:none;

}

/*=========================================================
FORMS
=========================================================*/

.app-form-group{

margin-bottom:18px;

}

.app-form-label{

display:block;
margin-bottom:7px;
font-size:13px;
font-weight:600;

}

.app-form-control{

display:block;
width:100%;
padding:11px 13px;
border:1px solid var(--border);
border-radius:10px;
background:#FFFFFF;
color:var(--text);
font:400 14px inherit;
transition:border-color var(--transition),box-shadow var(--transition);

}

.app-form-select{

display:block;
width:100%;
padding:11px 13px;
border:1px solid var(--border);
border-radius:10px;
background:#FFFFFF;
color:var(--text);
font:400 14px inherit;
transition:border-color var(--transition),box-shadow var(--transition);

}

.app-form-control:focus{

border-color:var(--primary);
box-shadow:0 0 0 3px rgba(37,99,235,.14);
outline:none;

}

.app-form-select:focus{

border-color:var(--primary);
box-shadow:0 0 0 3px rgba(37,99,235,.14);
outline:none;

}

/*=========================================================
BUTTONS AND BADGES
=========================================================*/

.app-btn{

display:inline-flex;
align-items:center;
justify-content:center;
gap:7px;
transition:transform var(--transition),background var(--transition),box-shadow var(--transition);

}

.app-btn:hover{

transform:translateY(-2px);

}

.app-btn:disabled{

cursor:not-allowed;
opacity:.65;
pointer-events:none;
transform:none;
box-shadow:none;

}

.app-badge{

display:inline-flex;
align-items:center;
padding:4px 9px;
border-radius:999px;
font-size:11px;
font-weight:600;

}

.app-badge-primary{

background:#DBEAFE;
color:#1D4ED8;

}

.app-badge-success{

background:#D1FAE5;
color:#047857;

}

.app-badge-danger{

background:#FEE2E2;
color:#B91C1C;

}

.app-badge-warning{

background:var(--warning-light);
color:#B45309;

}

/*=========================================================
TOAST, MODAL, LOADING, EMPTY STATE
=========================================================*/

.app-toast-container{

position:fixed;
right:20px;
bottom:20px;
z-index:var(--z-toast);
display:grid;
gap:10px;

}

.app-toast{

display:flex;
min-width:280px;
max-width:380px;
align-items:flex-start;
gap:10px;
padding:14px;
border:1px solid var(--border);
border-radius:13px;
background:#FFFFFF;
box-shadow:var(--shadow);
font-size:13px;

}

.app-modal-backdrop{

position:fixed;
z-index:var(--z-modal);
inset:0;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
background:rgba(15,23,42,.55);

}

.app-modal{

width:min(100%,560px);
border-radius:var(--radius);
background:#FFFFFF;
box-shadow:0 24px 60px rgba(15,23,42,.25);

}

.app-loading{

display:inline-flex;
align-items:center;
gap:9px;
color:var(--text-muted);
font-size:13px;

}

.app-spinner{

width:18px;
height:18px;
border:2px solid #DBEAFE;
border-top-color:var(--primary);
border-radius:50%;
animation:app-spin .7s linear infinite;

}

@keyframes app-spin{

to{

transform:rotate(360deg);

}

}

@keyframes fadeInUp{

from{

opacity:0;
transform:translateY(10px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.app-empty{

padding:32px 16px;
color:var(--text-muted);
font-size:13px;
text-align:center;

}

/*=========================================================
UTILITY CLASSES
=========================================================*/

.app-text-primary{

color:var(--primary) !important;

}

.app-text-success{

color:var(--success) !important;

}

.app-text-danger{

color:var(--danger) !important;

}

.app-text-warning{

color:var(--warning) !important;

}

.app-text-muted{

color:var(--text-muted) !important;

}

.app-bg-soft{

background:#F8FAFC !important;

}

.app-bg-warning{

background:var(--warning-light) !important;

}

.app-border{

border:1px solid var(--border) !important;

}

.app-border-warning{

border:1px solid var(--border-warning) !important;

}

.app-rounded{

border-radius:var(--radius) !important;

}

.app-shadow{

box-shadow:var(--shadow) !important;

}

.app-hidden{

display:none !important;

}

.app-flex{

display:flex !important;

}

.app-flex-center{

display:flex !important;
align-items:center !important;
justify-content:center !important;

}

.app-flex-between{

display:flex !important;
align-items:center !important;
justify-content:space-between !important;

}

.app-gap-1{

gap:4px !important;

}

.app-gap-2{

gap:8px !important;

}

.app-gap-3{

gap:16px !important;

}

.app-p-1{

padding:4px !important;

}

.app-p-2{

padding:8px !important;

}

.app-p-3{

padding:16px !important;

}

.app-m-1{

margin:4px !important;

}

.app-m-2{

margin:8px !important;

}

.app-m-3{

margin:16px !important;

}

/*=========================================================
RESPONSIVE
=========================================================*/

@media(max-width:992px){

.app-sidebar{

width:80px;
padding:18px 10px;

}

.app-menu-item{

justify-content:center;
padding:14px 8px;

}

.app-menu-item span{

display:none;

}

.app-sidebar-footer{

display:none;

}

.app-dashboard-grid{

grid-template-columns:repeat(2,minmax(0,1fr));

}

}

@media(max-width:768px){

.app-header{

padding:0 18px;

}

.app-main{

padding:18px;

}

.app-welcome{

align-items:flex-start;
flex-direction:column;
padding:26px;

}

.app-welcome-right{

width:100%;

}

.app-welcome-right .app-btn{

width:100%;

}

}

@media(max-width:480px){

.app-sidebar{

width:64px;
padding:14px 8px;

}

.app-main{

padding:13px;

}

.app-dashboard-grid{

gap:12px;

}

.app-dashboard-grid .app-card{

min-height:138px;

}

.app-dashboard-grid h2{

font-size:24px;

}

.app-toast{

min-width:0;
max-width:calc(100vw - 40px);

}

}

.app-welcome::before{

content:"";

position:absolute;

right:80px;

bottom:-60px;

width:140px;

height:140px;

background:rgba(255,255,255,.05);

border-radius:50%;

}

/*=========================================================
DASHBOARD ANALYTICS
=========================================================*/

.app-analytics-section{

margin-top:30px;

}

.app-analytics-heading{

display:flex;
align-items:center;
justify-content:space-between;
gap:16px;
margin-bottom:18px;

}

.app-analytics-heading h4{

margin:0 0 3px;
font-size:17px;

}

.app-analytics-heading small{

color:var(--text-muted);

}

.app-chart-card{

height:100%;
padding:24px;

}

.app-chart-card h5{

margin:0 0 18px;
font-size:14px;

}

.app-chart-wrap{

position:relative;
height:280px;

}

.app-chart-wrap-doughnut{

max-width:320px;
margin:0 auto;

}

@media(max-width:768px){

.app-chart-wrap{

height:240px;

}

}

</style>

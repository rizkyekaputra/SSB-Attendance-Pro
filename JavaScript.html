<script>

/*=========================================================
SSB Attendance Pro Enterprise
JavaScript Framework v2.0.0
=========================================================*/

const APP = {

currentPage:"dashboard",

pages:[
"dashboard",
"license",
"customer",
"report",
"setting"
],

/*=========================================================
START
=========================================================*/

start(){

console.log("SSB Attendance Pro Enterprise v2");

this.showPage("dashboard");

this.dashboard.load();

},

/*=========================================================
SHOW PAGE
=========================================================*/

showPage(page){

this.currentPage=page;

this.pages.forEach(function(name){

const el=document.getElementById(name+"Page");

if(el){

el.style.display=(name===page)
?"block"
:"none";

}

});

document
.querySelectorAll(".app-menu-item")
.forEach(function(btn){

btn.classList.remove("active");

if(btn.dataset.page===page){

btn.classList.add("active");

}

});

},

/*=========================================================
DASHBOARD MODULE
=========================================================*/

dashboard:{

charts:{},

analyticsRendered:false,

load(){

google.script.run
.withSuccessHandler(APP.dashboard.render)
.withFailureHandler(APP.error)
.dashboardGetData();

},

render(data){

// ===========================
// Statistic
// ===========================

document.getElementById("dashTotalLicense").textContent=data.totalLicense;

document.getElementById("dashTotalCustomer").textContent=data.totalCustomer;

document.getElementById("dashTotalActive").textContent=data.totalActive;

document.getElementById("dashTotalExpired").textContent=data.totalExpired;


// ===========================
// System
// ===========================

document.getElementById("dashVersion").textContent=data.version;

document.getElementById("dashDatabase").textContent=data.database;

document.getElementById("dashServer").textContent=data.server;


// ===========================
// Today
// ===========================

const today=new Date();

document.getElementById("dashToday").textContent=

today.toLocaleDateString("id-ID",{

weekday:"long",

day:"numeric",

month:"long",

year:"numeric"

});

// ===========================
// Greeting
// ===========================

const hour = new Date().getHours();

let greeting = "Selamat Malam 🌙";

if(hour >= 5 && hour < 10){

    greeting = "Selamat Pagi 🌅";

}else if(hour >= 10 && hour < 15){

    greeting = "Selamat Siang ☀";

}else if(hour >= 15 && hour < 18){

    greeting = "Selamat Sore 🌤";

}

document.getElementById("dashGreeting").textContent = greeting;


// ===========================
// Activity
// ===========================

let html="";

if(data.recentActivity.length==0){

html=`

<div class="app-empty">

Belum ada aktivitas.

</div>

`;

}else{

data.recentActivity.forEach(function(item){

html+=`

<div class="app-activity-item">

<div class="app-activity-icon">

<i class="bi bi-clock-history"></i>

</div>

<div>

<strong>${item.action}</strong>

<br>

<small>${item.detail}</small>

</div>

</div>

`;

});

}

document.getElementById("dashActivity").innerHTML=html;

APP.dashboard.renderAnalytics(data);

},

renderAnalytics(data){

const animation=!this.analyticsRendered;

Object.values(this.charts).forEach(function(chart){

if(chart){

chart.destroy();

}

});

const common={

responsive:true,

maintainAspectRatio:false,

animation:animation,

plugins:{legend:{labels:{usePointStyle:true,boxWidth:8}}}

};

const licenseGrowthCanvas=document.getElementById("licenseGrowthChart");

if(licenseGrowthCanvas){

this.charts.licenseGrowth=new Chart(licenseGrowthCanvas,{

type:"line",

data:{

labels:data.chart.license.labels,

datasets:[{

label:"Licenses",

data:data.chart.license.values,

borderColor:"#2563EB",

backgroundColor:"rgba(37,99,235,.12)",

fill:true,

tension:.4,

pointRadius:3

}]

},

options:common

});

}

const licenseStatusCanvas=document.getElementById("licenseStatusChart");

if(licenseStatusCanvas){

this.charts.licenseStatus=new Chart(licenseStatusCanvas,{

type:"doughnut",

data:{

labels:["Active","Expired"],

datasets:[{

data:[

data.chart.status.active,

data.chart.status.expired

],

backgroundColor:["#10B981","#EF4444"],

borderWidth:0

}]

},

options:common

});

}

const customerGrowthCanvas=document.getElementById("customerGrowthChart");

if(customerGrowthCanvas){

this.charts.customerGrowth=new Chart(customerGrowthCanvas,{

type:"bar",

data:{

labels:data.chart.customer.labels,

datasets:[{

label:"Customers",

data:data.chart.customer.values,

backgroundColor:"#7C3AED",

borderRadius:7,

borderSkipped:false

}]

},

options:common

});

}

this.analyticsRendered=true;

}

},

error(err){

console.error(err);

alert(err.message);

},

/*=========================================================
LICENSE
=========================================================*/

license:{

load(){

console.log("License Module");

},

openGenerator(){

const trigger=document.getElementById("btnGenerateLicense");

if(trigger){trigger.disabled=false;trigger.removeAttribute("aria-disabled");}

let modal=document.getElementById("licenseGeneratorModal");

if(!modal){

modal=document.createElement("div");

modal.className="modal fade";

modal.id="licenseGeneratorModal";

modal.tabIndex=-1;

modal.innerHTML=['<div class="modal-dialog modal-lg"><form class="modal-content" id="licenseGeneratorForm">','<div class="modal-header"><h5 class="modal-title">Generate License</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>','<div class="modal-body"><div class="row g-3">','<div class="col-md-6"><label class="form-label">Nama SSB</label><input class="form-control" name="ssbName" required></div>','<div class="col-md-6"><label class="form-label">Nama Pembeli</label><input class="form-control" name="customerName" required></div>','<div class="col-md-6"><label class="form-label">WhatsApp</label><input class="form-control" name="whatsapp" required></div>','<div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div>','<div class="col-md-6"><label class="form-label">Kota</label><input class="form-control" name="city" required></div>','<div class="col-md-3"><label class="form-label">Version</label><input class="form-control" name="version" value="Enterprise" required></div>','<div class="col-md-3"><label class="form-label">Expired Duration</label><input class="form-control" name="duration" type="number" min="1" value="12" required></div>','</div></div><div class="modal-footer"><button class="btn btn-primary" id="licenseGeneratorSubmit">Generate License</button></div></form></div>'].join("");

document.body.appendChild(modal);

modal.querySelector("form").addEventListener("submit",function(event){event.preventDefault();APP.license.submitGenerator();});

}

this.modal=bootstrap.Modal.getOrCreateInstance(modal);

this.modal.show();

},

submitGenerator(){

const form=document.getElementById("licenseGeneratorForm");

if(!form.checkValidity()){form.reportValidity();return;}

const payload=Object.fromEntries(new FormData(form).entries());

payload.duration=Number(payload.duration);

this.setLoading(true);

google.script.run.withSuccessHandler(function(result){

APP.license.setLoading(false);
APP.license.modal.hide();
APP.license.resetGenerator();
APP.license.showSuccess(result);
APP.dashboard.load();

}).withFailureHandler(function(error){

APP.license.setLoading(false);
alert(error.message||error);

}).licenseGenerate(payload);

},

showSuccess(result){

const alert=document.createElement("div");
alert.className="alert alert-success alert-dismissible fade show position-fixed top-0 end-0 m-3";
alert.innerHTML=['<strong>License generated.</strong> ',result.licenseKey,'<button type="button" class="btn-close" data-bs-dismiss="alert"></button>'].join("");
document.body.appendChild(alert);

},

setLoading(isLoading){

const submit=document.getElementById("licenseGeneratorSubmit");
if(submit){submit.disabled=isLoading;submit.textContent=isLoading?"Generating...":"Generate License";}

},

resetGenerator(){

const form=document.getElementById("licenseGeneratorForm");
if(form) form.reset();

}

},

/*=========================================================
CUSTOMER
=========================================================*/

customer:{

load(){

google.script.run
.withSuccessHandler(APP.customer.render)
.withFailureHandler(function(error){

APP.customer.renderError(error);

})
.customerGetData();

},

render(data){

function escapeHtml(value){

  return String(value==null?"":value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\"/g,"&quot;")
    .replace(/'/g,"&#39;");

}

const container=document.getElementById("customerPageContent");

if(!container) return;

const customers=data.customers||[];
const stats=data.stats||{};
let filteredCustomers=customers.slice();

const searchTerm=(document.getElementById("customerSearch")?document.getElementById("customerSearch").value:""
).toString().trim().toLowerCase();

const filterLicense=(document.getElementById("customerFilterLicense")?document.getElementById("customerFilterLicense").value:""
).toString().trim().toLowerCase();

const filterCity=(document.getElementById("customerFilterCity")?document.getElementById("customerFilterCity").value:""
).toString().trim().toLowerCase();

filteredCustomers=filteredCustomers.filter(function(item){

const searchText=[item.id,item.ssbName,item.buyerName,item.whatsapp,item.email,item.city,item.license].join(" ").toLowerCase();
const matchesSearch=!searchTerm || searchText.indexOf(searchTerm)!==-1;
const matchesLicense=!filterLicense || (filterLicense==="assigned"?Boolean(item.license):!item.license);
const matchesCity=!filterCity || String(item.city||"").trim().toLowerCase()===filterCity;

return matchesSearch && matchesLicense && matchesCity;

});

const rows=filteredCustomers.map(function(item){

const purchaseDate=escapeHtml(item.purchaseDate||"-");
const licenseCell=item.license?escapeHtml(item.license):'<span class="text-muted">Pending</span>';

return '<tr><td>'+escapeHtml(item.id||"-")+'</td><td>'+escapeHtml(item.ssbName||"-")+'</td><td>'+escapeHtml(item.buyerName||"-")+'</td><td>'+escapeHtml(item.whatsapp||"-")+'</td><td>'+escapeHtml(item.email||"-")+'</td><td>'+escapeHtml(item.city||"-")+'</td><td>'+purchaseDate+'</td><td>'+licenseCell+'</td></tr>';

}).join("");

const cityOptions=[].concat(customers.map(function(item){return String(item.city||"").trim();})).filter(function(city){return city;}).sort().filter(function(city,index,array){return array.indexOf(city)===index;});

const citySelectOptions=cityOptions.map(function(city){return '<option value="'+escapeHtml(city)+'">'+escapeHtml(city)+'</option>';}).join("");

const html=[
'<div class="app-card mb-4">',
'<div class="d-flex justify-content-between align-items-center">',
'<div>',
'<h2 class="mb-1"><i class="bi bi-people-fill"></i> Customer Management</h2>',
'<small class="text-muted">Kelola seluruh customer SSB Attendance Pro Enterprise.</small>',
'</div>',
'<div class="d-flex gap-2">',
'<button class="btn btn-outline-primary" id="btnRefreshCustomer" type="button"><i class="bi bi-arrow-clockwise"></i> Refresh</button>',
'<button class="btn btn-success" id="btnExportCustomer" type="button" disabled><i class="bi bi-download"></i> Export</button>',
'</div>',
'</div>',
'</div>',
'<div id="customerStats" class="row g-4 mb-4">',
'<div class="col-lg-3 col-md-6"><div class="app-card text-center"><i class="bi bi-people-fill fs-2 text-primary"></i><h3 class="mt-3 mb-1">'+escapeHtml(stats.total||0)+'</h3><small class="text-muted">Total Customer</small></div></div>',
'<div class="col-lg-3 col-md-6"><div class="app-card text-center"><i class="bi bi-key-fill fs-2 text-success"></i><h3 class="mt-3 mb-1">'+escapeHtml(stats.withLicense||0)+'</h3><small class="text-muted">With License</small></div></div>',
'<div class="col-lg-3 col-md-6"><div class="app-card text-center"><i class="bi bi-calendar2-week fs-2 text-warning"></i><h3 class="mt-3 mb-1">'+escapeHtml(stats.thisMonth||0)+'</h3><small class="text-muted">This Month</small></div></div>',
'<div class="col-lg-3 col-md-6"><div class="app-card text-center"><i class="bi bi-clipboard2-check fs-2 text-info"></i><h3 class="mt-3 mb-1">'+escapeHtml(customers.length>0?"Ready":"0")+'</h3><small class="text-muted">Data Ready</small></div></div>',
'</div>',
'<div id="customerToolbar" class="app-card mb-4">',
'<div class="row g-3 align-items-center">',
'<div class="col-lg-4">',
'<div class="input-group">',
'<span class="input-group-text"><i class="bi bi-search"></i></span>',
'<input type="text" id="customerSearch" class="form-control" placeholder="Cari Nama SSB, Pembeli atau Email...">',
'</div>',
'</div>',
'<div class="col-lg-2">',
'<select id="customerFilterLicense" class="form-select">',
'<option value="">Semua Status</option>',
'<option value="assigned">Assigned</option>',
'<option value="pending">Pending</option>',
'</select>',
'</div>',
'<div class="col-lg-2">',
'<select id="customerFilterCity" class="form-select">',
'<option value="">Semua Kota</option>',
citySelectOptions,
'</select>',
'</div>',
'<div class="col-lg-2 d-grid">',
'<button class="btn btn-outline-primary" id="btnRefreshCustomerInline" type="button"><i class="bi bi-arrow-clockwise"></i> Refresh</button>',
'</div>',
'<div class="col-lg-2 d-grid">',
'<button class="btn btn-success" id="btnExportCustomerInline" type="button" disabled><i class="bi bi-download"></i> Export</button>',
'</div>',
'</div>',
'</div>',
'<div id="customerTableContainer" class="app-card">',
'<div class="table-responsive">',
'<table class="table table-hover align-middle mb-0">',
'<thead class="table-light"><tr><th>Customer ID</th><th>Nama SSB</th><th>Nama Pembeli</th><th>WA</th><th>Email</th><th>Kota</th><th>Tanggal Beli</th><th>License</th></tr></thead>',
'<tbody id="customerTableBody">',
(rows?rows:'<tr><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-folder2-open fs-1 d-block mb-3"></i>Belum ada data Customer</td></tr>'),
'</tbody>',
'</table>',
'</div>',
'</div>',
].join("");

container.innerHTML=html;

const refreshButtons=document.querySelectorAll("#btnRefreshCustomer, #btnRefreshCustomerInline");

refreshButtons.forEach(function(btn){

btn.addEventListener("click",function(){APP.customer.load();});

});

const searchInput=document.getElementById("customerSearch");
const licenseFilter=document.getElementById("customerFilterLicense");
const cityFilter=document.getElementById("customerFilterCity");

if(searchInput){searchInput.addEventListener("input",function(){APP.customer.render(data);});}
if(licenseFilter){licenseFilter.addEventListener("change",function(){APP.customer.render(data);});}
if(cityFilter){cityFilter.addEventListener("change",function(){APP.customer.render(data);});}

},

renderError(error){

const container=document.getElementById("customerPageContent");

if(!container) return;

container.innerHTML=[
'<div class="app-card">',
'<div class="alert alert-danger" role="alert">',
'<strong>Failed to load customer data.</strong>',
'<div class="mt-2">'+(error&&error.message?error.message:"Unknown error")+'</div>',
'</div>',
'</div>'
].join("");

}

},

/*=========================================================
REPORT
=========================================================*/

report:{

load(){

console.log("Report Module");

}

},

/*=========================================================
SETTING
=========================================================*/

setting:{

load(){

console.log("Setting Module");

}

}

};


/*=========================================================
EVENT
=========================================================*/

document.addEventListener("DOMContentLoaded",function(){

APP.start();

});


/*=========================================================
MENU CLICK
=========================================================*/

document.querySelectorAll(".app-menu-item")

.forEach(function(btn){

btn.addEventListener("click",function(){

const page=this.dataset.page;

APP.showPage(page);

switch(page){

case"dashboard":

APP.dashboard.load();

break;

case"license":

APP.license.load();

break;

case"customer":

APP.customer.load();

break;

case"report":

APP.report.load();

break;

case"setting":

APP.setting.load();

break;

}

});

});

</script>

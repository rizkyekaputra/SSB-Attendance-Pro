<script>

/*=========================================================
SSB Attendance Pro Enterprise
JavaScript Framework v2.0.0
=========================================================*/

const APP = {

currentPage:"dashboard",

pages:[
"dashboard",
"license",
"customer",
"report",
"setting"
],

/*=========================================================
START
=========================================================*/

start(){

console.log("SSB Attendance Pro Enterprise v2");

this.showPage("dashboard");

this.dashboard.load();

},

/*=========================================================
SHOW PAGE
=========================================================*/

showPage(page){

this.currentPage=page;

this.pages.forEach(function(name){

const el=document.getElementById(name+"Page");

if(el){

el.style.display=(name===page)
?"block"
:"none";

}

});

document
.querySelectorAll(".app-menu-item")
.forEach(function(btn){

btn.classList.remove("active");

if(btn.dataset.page===page){

btn.classList.add("active");

}

});

},

/*=========================================================
DASHBOARD MODULE
=========================================================*/

dashboard:{

charts:{},

analyticsRendered:false,

load(){

google.script.run
.withSuccessHandler(APP.dashboard.render)
.withFailureHandler(APP.error)
.dashboardGetData();

},

render(data){

// ===========================
// Statistic
// ===========================

document.getElementById("dashTotalLicense").textContent=data.totalLicense;

document.getElementById("dashTotalCustomer").textContent=data.totalCustomer;

document.getElementById("dashTotalActive").textContent=data.totalActive;

document.getElementById("dashTotalExpired").textContent=data.totalExpired;


// ===========================
// System
// ===========================

document.getElementById("dashVersion").textContent=data.version;

document.getElementById("dashDatabase").textContent=data.database;

document.getElementById("dashServer").textContent=data.server;


// ===========================
// Today
// ===========================

const today=new Date();

document.getElementById("dashToday").textContent=

today.toLocaleDateString("id-ID",{

weekday:"long",

day:"numeric",

month:"long",

year:"numeric"

});

// ===========================
// Greeting
// ===========================

const hour = new Date().getHours();

let greeting = "Selamat Malam 🌙";

if(hour >= 5 && hour < 10){

    greeting = "Selamat Pagi 🌅";

}else if(hour >= 10 && hour < 15){

    greeting = "Selamat Siang ☀";

}else if(hour >= 15 && hour < 18){

    greeting = "Selamat Sore 🌤";

}

document.getElementById("dashGreeting").textContent = greeting;


// ===========================
// Activity
// ===========================

let html="";

if(data.recentActivity.length==0){

html=`

<div class="app-empty">

Belum ada aktivitas.

</div>

`;

}else{

data.recentActivity.forEach(function(item){

html+=`

<div class="app-activity-item">

<div class="app-activity-icon">

<i class="bi bi-clock-history"></i>

</div>

<div>

<strong>${item.action}</strong>

<br>

<small>${item.detail}</small>

</div>

</div>

`;

});

}

document.getElementById("dashActivity").innerHTML=html;

APP.dashboard.renderAnalytics(data);

},

renderAnalytics(data){

const animation=!this.analyticsRendered;

Object.values(this.charts).forEach(function(chart){

if(chart){

chart.destroy();

}

});

const common={

responsive:true,

maintainAspectRatio:false,

animation:animation,

plugins:{legend:{labels:{usePointStyle:true,boxWidth:8}}}

};

const licenseGrowthCanvas=document.getElementById("licenseGrowthChart");

if(licenseGrowthCanvas){

this.charts.licenseGrowth=new Chart(licenseGrowthCanvas,{

type:"line",

data:{

labels:data.chart.license.labels,

datasets:[{

label:"Licenses",

data:data.chart.license.values,

borderColor:"#2563EB",

backgroundColor:"rgba(37,99,235,.12)",

fill:true,

tension:.4,

pointRadius:3

}]

},

options:common

});

}

const licenseStatusCanvas=document.getElementById("licenseStatusChart");

if(licenseStatusCanvas){

this.charts.licenseStatus=new Chart(licenseStatusCanvas,{

type:"doughnut",

data:{

labels:["Active","Expired"],

datasets:[{

data:[

data.chart.status.active,

data.chart.status.expired

],

backgroundColor:["#10B981","#EF4444"],

borderWidth:0

}]

},

options:common

});

}

const customerGrowthCanvas=document.getElementById("customerGrowthChart");

if(customerGrowthCanvas){

this.charts.customerGrowth=new Chart(customerGrowthCanvas,{

type:"bar",

data:{

labels:data.chart.customer.labels,

datasets:[{

label:"Customers",

data:data.chart.customer.values,

backgroundColor:"#7C3AED",

borderRadius:7,

borderSkipped:false

}]

},

options:common

});

}

this.analyticsRendered=true;

}

},

error(err){

console.error(err);

alert(err.message);

},

/*=========================================================
LICENSE
=========================================================*/

license:{

load(){

console.log("License Module");

},

openGenerator(){

const trigger=document.getElementById("btnGenerateLicense");

if(trigger){trigger.disabled=false;trigger.removeAttribute("aria-disabled");}

let modal=document.getElementById("licenseGeneratorModal");

if(!modal){

modal=document.createElement("div");

modal.className="modal fade";

modal.id="licenseGeneratorModal";

modal.tabIndex=-1;

modal.innerHTML=['<div class="modal-dialog modal-lg"><form class="modal-content" id="licenseGeneratorForm">','<div class="modal-header"><h5 class="modal-title">Generate License</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>','<div class="modal-body"><div class="row g-3">','<div class="col-md-6"><label class="form-label">Nama SSB</label><input class="form-control" name="ssbName" required></div>','<div class="col-md-6"><label class="form-label">Nama Pembeli</label><input class="form-control" name="customerName" required></div>','<div class="col-md-6"><label class="form-label">WhatsApp</label><input class="form-control" name="whatsapp" required></div>','<div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div>','<div class="col-md-6"><label class="form-label">Kota</label><input class="form-control" name="city" required></div>','<div class="col-md-3"><label class="form-label">Version</label><input class="form-control" name="version" value="Enterprise" required></div>','<div class="col-md-3"><label class="form-label">Expired Duration</label><input class="form-control" name="duration" type="number" min="1" value="12" required></div>','</div></div><div class="modal-footer"><button class="btn btn-primary" id="licenseGeneratorSubmit">Generate License</button></div></form></div>'].join("");

document.body.appendChild(modal);

modal.querySelector("form").addEventListener("submit",function(event){event.preventDefault();APP.license.submitGenerator();});

}

this.modal=bootstrap.Modal.getOrCreateInstance(modal);

this.modal.show();

},

submitGenerator(){

const form=document.getElementById("licenseGeneratorForm");

if(!form.checkValidity()){form.reportValidity();return;}

const payload=Object.fromEntries(new FormData(form).entries());

payload.duration=Number(payload.duration);

this.setLoading(true);

google.script.run.withSuccessHandler(function(result){

APP.license.setLoading(false);
APP.license.modal.hide();
APP.license.resetGenerator();
APP.license.showSuccess(result);
APP.dashboard.load();

}).withFailureHandler(function(error){

APP.license.setLoading(false);
alert(error.message||error);

}).licenseGenerate(payload);

},

showSuccess(result){

const alert=document.createElement("div");
alert.className="alert alert-success alert-dismissible fade show position-fixed top-0 end-0 m-3";
alert.innerHTML=['<strong>License generated.</strong> ',result.licenseKey,'<button type="button" class="btn-close" data-bs-dismiss="alert"></button>'].join("");
document.body.appendChild(alert);

},

setLoading(isLoading){

const submit=document.getElementById("licenseGeneratorSubmit");
if(submit){submit.disabled=isLoading;submit.textContent=isLoading?"Generating...":"Generate License";}

},

resetGenerator(){

const form=document.getElementById("licenseGeneratorForm");
if(form) form.reset();

}

},

/*=========================================================
CUSTOMER
=========================================================*/

customer:{

load(){

console.log("Customer Module");

}

},

/*=========================================================
REPORT
=========================================================*/

report:{

load(){

console.log("Report Module");

}

},

/*=========================================================
SETTING
=========================================================*/

setting:{

load(){

console.log("Setting Module");

}

}

};


/*=========================================================
EVENT
=========================================================*/

document.addEventListener("DOMContentLoaded",function(){

APP.start();

});


/*=========================================================
MENU CLICK
=========================================================*/

document.querySelectorAll(".app-menu-item")

.forEach(function(btn){

btn.addEventListener("click",function(){

const page=this.dataset.page;

APP.showPage(page);

switch(page){

case"dashboard":

APP.dashboard.load();

break;

case"license":

APP.license.load();

break;

case"customer":

APP.customer.load();

break;

case"report":

APP.report.load();

break;

case"setting":

APP.setting.load();

break;

}

});

});

</script>
